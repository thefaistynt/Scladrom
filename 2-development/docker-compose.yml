services:
  db:
    image: postgres:16-alpine
    container_name: vertical-postgres
    environment:
      POSTGRES_DB: vertical
      POSTGRES_USER: vertical
      POSTGRES_PASSWORD: vertical123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertical -d vertical"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/init/001_init_db.sql:/docker-entrypoint-initdb.d/00-init.sql:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vertical-backend
    environment:
      DATABASE_URL: postgresql+psycopg://vertical:vertical123@db:5432/vertical
      CREATE_TABLES_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vertical-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
